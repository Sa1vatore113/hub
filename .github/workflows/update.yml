name: Update Gamer Calendar Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run update script
        run: python update_data.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GamerHub-Bot"
          git config --global user.email "bot@gamerhub.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update calendar data" && git pull --rebase -X theirs origin main && git push origin main)
