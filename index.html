<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Hub | Digital Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: #fff; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; }
        .day { background: #080808; min-height: 90px; padding: 8px; transition: 0.2s; }
        .day:hover { background: #0c0c0c; }
        .event { font-size: 9px; padding: 2px 6px; border-radius: 4px; margin-bottom: 2px; font-weight: 700; text-transform: uppercase; border-left: 2px solid transparent; }
        .type-game { background: rgba(59,130,246,0.1); color: #60a5fa; border-color: #3b82f6; }
        .type-navi { background: rgba(250,204,21,0.1); color: #facc15; border-color: #facc15; }
        .type-foot { background: rgba(239,68,68,0.1); color: #f87171; border-color: #ef4444; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [viewDate, setViewDate] = useState(new Date());
            const [events, setEvents] = useState([]);
            const [loading, setLoading] = useState(true);

            // Загрузка данных из автоматического файла
            useEffect(() => {
                fetch('data.json')
                    .then(res => res.json())
                    .then(data => { setEvents(data); setLoading(false); })
                    .catch(() => {
                        // Если файла еще нет, покажем пример
                        setEvents([
                            { date: '2026-04-17', title: 'NAVI vs G2', type: 'navi' },
                            { date: '2026-04-22', title: 'Barca - Celta', type: 'foot' }
                        ]);
                        setLoading(false);
                    });
            }, []);

            const calendar = useMemo(() => {
                const year = viewDate.getFullYear();
                const month = viewDate.getMonth();
                const days = new Date(year, month + 1, 0).getDate();
                let first = new Date(year, month, 1).getDay();
                first = first === 0 ? 6 : first - 1;

                const grid = [];
                for (let i = 0; i < first; i++) grid.push(null);
                for (let i = 1; i <= days; i++) {
                    const dStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    grid.push({ day: i, events: events.filter(e => e.date === dStr) });
                }
                return grid;
            }, [viewDate, events]);

            return (
                <div className="flex flex-col lg:flex-row min-h-screen">
                    <aside className="w-full lg:w-64 bg-[#080808] border-r border-white/5 p-8 flex flex-col">
                        <div className="text-xl font-black mb-10 tracking-tighter uppercase">Gamer<span className="text-yellow-400">Hub</span></div>
                        <div className="space-y-4 flex-1">
                            <div className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Категории</div>
                            <div className="flex items-center gap-3 text-sm text-blue-400"><div className="w-2 h-2 rounded-full bg-blue-500"></div> Игры</div>
                            <div className="flex items-center gap-3 text-sm text-yellow-400"><div className="w-2 h-2 rounded-full bg-yellow-400"></div> NAVI</div>
                            <div className="flex items-center gap-3 text-sm text-red-400"><div className="w-2 h-2 rounded-full bg-red-500"></div> Футбол</div>
                        </div>
                        <div className="p-4 glass rounded-xl mt-10">
                            <div className="text-[10px] text-zinc-500 font-bold mb-1">АВТОМАТИЗАЦИЯ</div>
                            <div className="text-[10px] text-green-400 font-bold flex items-center gap-2">
                                <div className="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></div> ACTIVE
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 p-6 lg:p-12">
                        <div className="flex justify-between items-end mb-8">
                            <div>
                                <h2 className="text-3xl font-bold uppercase tracking-tighter">{viewDate.toLocaleString('ru', { month: 'long', year: 'numeric' })}</h2>
                                <p className="text-zinc-500 text-xs">Автоматическое обновление каждый день в 00:00</p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setViewDate(new Date(viewDate.setMonth(viewDate.getMonth() - 1)))} className="p-2 glass rounded-lg hover:bg-white/5">←</button>
                                <button onClick={() => setViewDate(new Date())} className="px-4 py-2 glass rounded-lg text-xs font-bold uppercase">Сегодня</button>
                                <button onClick={() => setViewDate(new Date(viewDate.setMonth(viewDate.getMonth() + 1)))} className="p-2 glass rounded-lg hover:bg-white/5">→</button>
                            </div>
                        </div>

                        <div className="calendar-grid">
                            {['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d => (
                                <div key={d} className="p-3 text-center text-[10px] font-bold text-zinc-600 uppercase">{d}</div>
                            ))}
                            {calendar.map((d, i) => (
                                <div key={i} className={`day ${!d ? 'opacity-10' : ''}`}>
                                    {d && (
                                        <>
                                            <div className="text-xs font-bold text-zinc-500 mb-2">{d.day}</div>
                                            {d.events.map((e, idx) => (
                                                <div key={idx} className={`event type-${e.type}`}>{e.title}</div>
                                            ))}
                                        </>
                                    )}
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
