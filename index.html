<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Hub | Digital Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #030303; color: #fff; overflow: hidden; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: rgba(255,255,255,0.03); border-radius: 16px; overflow: hidden; }
        .day { background: #080808; min-height: 105px; padding: 10px; transition: 0.3s; }
        .day:hover { background: #0c0c0c; }
        .event { font-size: 9px; padding: 3px 6px; border-radius: 4px; margin-bottom: 3px; font-weight: 700; text-transform: uppercase; cursor: pointer; border-left: 2px solid transparent; }
        .type-game { background: rgba(59,130,246,0.1); color: #60a5fa; border-color: #3b82f6; }
        .type-navi { background: rgba(250,204,21,0.1); color: #facc15; border-color: #facc15; }
        .type-foot { background: rgba(239,68,68,0.1); color: #f87171; border-color: #ef4444; }
        .type-news { background: rgba(168,85,247,0.1); color: #c084fc; border-color: #a855f7; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [viewDate, setViewDate] = useState(new Date());
            const [events, setEvents] = useState([]);
            const [selected, setSelected] = useState(null);
            const [filter, setFilter] = useState('all');

            useEffect(() => {
                fetch('data.json').then(res => res.json()).then(data => setEvents(data)).catch(() => {});
            }, []);

            const grid = useMemo(() => {
                const y = viewDate.getFullYear(), m = viewDate.getMonth();
                const total = new Date(y, m + 1, 0).getDate();
                let first = new Date(y, m, 1).getDay();
                first = first === 0 ? 6 : first - 1;
                const res = [];
                for (let i = 0; i < first; i++) res.push(null);
                for (let i = 1; i <= total; i++) {
                    const dStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    res.push({ day: i, date: dStr, evs: events.filter(e => e.date === dStr && (filter === 'all' || e.type === filter)) });
                }
                return res;
            }, [viewDate, events, filter]);

            return (
                <div className="flex h-screen overflow-hidden">
                    <aside className="w-64 bg-[#080808] border-r border-white/5 p-8 flex flex-col">
                        <div className="text-xl font-black mb-10 tracking-tighter uppercase">Gamer<span className="text-yellow-400">Hub</span></div>
                        <nav className="space-y-1 flex-1">
                            {['all', 'game', 'navi', 'foot', 'news'].map(t => (
                                <button key={t} onClick={() => setFilter(t)} className={`w-full text-left px-4 py-3 rounded-xl text-xs font-bold uppercase transition ${filter === t ? 'bg-white/10 text-white' : 'text-zinc-500'}`}>
                                    {t === 'all' ? 'Все' : t === 'game' ? 'Игры' : t === 'navi' ? 'NAVI' : t === 'foot' ? 'Футбол' : 'Новости'}
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 glass rounded-xl text-[10px] text-green-400 font-bold uppercase animate-pulse italic text-center">Live Sync Active</div>
                    </aside>

                    <main className="flex-1 p-10 overflow-y-auto">
                        <div className="flex justify-between items-end mb-10">
                            <h2 className="text-4xl font-black uppercase italic">{viewDate.toLocaleString('ru', { month: 'long', year: 'numeric' })}</h2>
                            <div className="flex gap-2 p-1 glass rounded-xl">
                                <button onClick={() => setViewDate(new Date(viewDate.setMonth(viewDate.getMonth() - 1)))} className="p-2 hover:bg-white/5 rounded-lg">←</button>
                                <button onClick={() => setViewDate(new Date())} className="px-4 py-1 text-[10px] font-black uppercase">Сегодня</button>
                                <button onClick={() => setViewDate(new Date(viewDate.setMonth(viewDate.getMonth() + 1)))} className="p-2 hover:bg-white/5 rounded-lg">→</button>
                            </div>
                        </div>

                        <div className="calendar-grid">
                            {['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d => <div key={d} className="p-3 text-center text-[10px] font-black text-zinc-600 uppercase bg-[#0a0a0a]">{d}</div>)}
                            {grid.map((d, i) => (
                                <div key={i} className={`day ${!d ? 'opacity-10' : ''}`}>
                                    {d && (
                                        <>
                                            <div className="text-[10px] font-bold text-zinc-600 mb-2">{d.day}</div>
                                            {d.evs.map((e, idx) => <div key={idx} onClick={() => setSelected(e)} className={`event type-${e.type}`}>{e.title}</div>)}
                                        </>
                                    )}
                                </div>
                            ))}
                        </div>
                    </main>

                    {selected && (
                        <div className="fixed inset-y-0 right-0 w-80 glass border-l border-white/10 p-8 z-20 shadow-2xl animate-in slide-in-from-right duration-300">
                            <button onClick={() => setSelected(null)} className="absolute top-4 right-4 text-zinc-500 hover:text-white">✕</button>
                            <div className={`w-8 h-1 mb-6 ${selected.type==='game'?'bg-blue-500':selected.type==='navi'?'bg-yellow-400':selected.type==='news'?'bg-purple-500':'bg-red-500'}`}></div>
                            <div className="text-[10px] font-black text-zinc-500 uppercase mb-2">{selected.date} {selected.time && `• ${selected.time}`}</div>
                            <h3 className="text-xl font-black leading-tight uppercase mb-4">{selected.title}</h3>
                            <p className="text-xs text-zinc-400 leading-relaxed">{selected.desc}</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
