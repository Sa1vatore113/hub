<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Hub | Цифровой Календарь</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #030303; color: #fff; overflow: hidden; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: rgba(255,255,255,0.03); border-radius: 16px; overflow: hidden; }
        .day { background: #080808; min-height: 110px; padding: 12px; transition: 0.3s; border-top: 1px solid rgba(255,255,255,0.02); }
        .day:hover { background: #0c0c0c; }
        .day.today { background: rgba(250, 204, 21, 0.03); }
        .event { font-size: 9px; padding: 4px 8px; border-radius: 6px; margin-bottom: 4px; font-weight: 700; text-transform: uppercase; cursor: pointer; border-left: 2px solid transparent; transition: all 0.2s; }
        .event:hover { transform: translateX(2px); filter: brightness(1.2); }
        .type-game { background: rgba(59,130,246,0.1); color: #60a5fa; border-color: #3b82f6; }
        .type-navi { background: rgba(250,204,21,0.1); color: #facc15; border-color: #facc15; }
        .type-foot { background: rgba(239,68,68,0.1); color: #f87171; border-color: #ef4444; }
        .type-news { background: rgba(168,85,247,0.1); color: #c084fc; border-color: #a855f7; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Анимация появления панели */
        .slide-in { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [viewDate, setViewDate] = useState(new Date());
            const [events, setEvents] = useState([]);
            const [selected, setSelected] = useState(null);
            const [filter, setFilter] = useState('all');

            useEffect(() => {
                // Загружаем данные с меткой времени, чтобы избежать кэширования
                fetch(`data.json?t=${Date.now()}`)
                    .then(res => res.json())
                    .then(data => setEvents(data))
                    .catch(() => {});
            }, []);

            const grid = useMemo(() => {
                const y = viewDate.getFullYear(), m = viewDate.getMonth();
                const total = new Date(y, m + 1, 0).getDate();
                let first = new Date(y, m, 1).getDay();
                first = first === 0 ? 6 : first - 1;
                const res = [];
                for (let i = 0; i < first; i++) res.push(null);
                for (let i = 1; i <= total; i++) {
                    const dStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    res.push({ 
                        day: i, 
                        date: dStr, 
                        evs: events.filter(e => e.date === dStr && (filter === 'all' || e.type === filter)) 
                    });
                }
                return res;
            }, [viewDate, events, filter]);

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Меню слева */}
                    <aside className="w-64 bg-[#080808] border-r border-white/5 p-8 flex flex-col z-10">
                        <div className="flex items-center gap-2 mb-10">
                            <div className="w-6 h-6 bg-yellow-400 rounded-md shadow-[0_0_15px_rgba(250,204,21,0.3)]"></div>
                            <div className="text-xl font-black tracking-tighter uppercase">GamerHub</div>
                        </div>
                        <nav className="space-y-1 flex-1">
                            {[
                                { id: 'all', label: 'Все события', color: 'bg-white' },
                                { id: 'game', label: 'AAA Игры', color: 'bg-blue-500' },
                                { id: 'navi', label: 'Матчи NAVI', color: 'bg-yellow-400' },
                                { id: 'foot', label: 'Футбол', color: 'bg-red-500' },
                                { id: 'news', label: 'Новости', color: 'bg-purple-500' }
                            ].map(t => (
                                <button key={t.id} onClick={() => setFilter(t.id)} className={`w-full text-left px-4 py-3 rounded-xl text-[10px] font-bold uppercase flex items-center gap-3 transition ${filter === t.id ? 'bg-white/10 text-white shadow-inner' : 'text-zinc-500 hover:text-zinc-300'}`}>
                                    <div className={`w-1.5 h-1.5 rounded-full ${t.color}`}></div>{t.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 glass rounded-2xl text-[9px] text-green-400 font-bold uppercase animate-pulse text-center tracking-widest border-green-500/20">Sync Live</div>
                    </aside>

                    {/* Календарь */}
                    <main className="flex-1 p-10 overflow-y-auto bg-[#030303] relative">
                        <div className="max-w-6xl mx-auto">
                            <div className="flex justify-between items-end mb-12">
                                <div>
                                    <h2 className="text-5xl font-black uppercase italic tracking-tighter leading-none">
                                        {viewDate.toLocaleString('ru', { month: 'long' })}
                                        <span className="text-zinc-800 ml-4">{viewDate.getFullYear()}</span>
                                    </h2>
                                </div>
                                <div className="flex gap-2 p-1 glass rounded-2xl">
                                    <button onClick={() => setViewDate(new Date(viewDate.setMonth(viewDate.getMonth() - 1)))} className="p-2 hover:bg-white/10 rounded-xl transition">←</button>
                                    <button onClick={() => setViewDate(new Date())} className="px-6 py-2 text-[10px] font-black uppercase tracking-widest">Сегодня</button>
                                    <button onClick={() => setViewDate(new Date(viewDate.setMonth(viewDate.getMonth() + 1)))} className="p-2 hover:bg-white/10 rounded-xl transition">→</button>
                                </div>
                            </div>
                            <div className="calendar-grid shadow-[0_0_50px_rgba(0,0,0,0.5)]">
                                {['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d => <div key={d} className="p-4 text-center text-[10px] font-black text-zinc-600 uppercase bg-[#0a0a0a] border-b border-white/5">{d}</div>)}
                                {grid.map((d, i) => (
                                    <div key={i} className={`day ${!d ? 'opacity-10' : ''}`}>
                                        {d && (
                                            <>
                                                <div className="text-[10px] font-bold text-zinc-600 mb-3">{d.day}</div>
                                                <div className="space-y-1">
                                                    {d.evs.map((e, idx) => <div key={idx} onClick={() => setSelected(e)} className={`event type-${e.type}`}>{e.title}</div>)}
                                                </div>
                                            </>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>

                    {/* Панель подробностей */}
                    {selected && (
                        <div className="fixed inset-y-0 right-0 w-96 glass border-l border-white/10 p-10 z-20 shadow-[-20px_0_50px_rgba(0,0,0,0.5)] flex flex-col slide-in">
                            <button onClick={() => setSelected(null)} className="absolute top-6 right-6 text-zinc-500 hover:text-white transition">ЗАКРЫТЬ ✕</button>
                            
                            <div className={`w-12 h-1 mb-10 rounded-full ${
                                selected.type === 'game' ? 'bg-blue-500' : 
                                selected.type === 'navi' ? 'bg-yellow-400' : 
                                selected.type === 'news' ? 'bg-purple-500' : 'bg-red-500'
                            }`}></div>
                            
                            <div className="text-[10px] font-black text-zinc-500 uppercase tracking-[0.3em] mb-4">
                                {selected.date} {selected.time && <span className="text-white/30 ml-2">• {selected.time}</span>}
                            </div>
                            
                            <h3 className="text-3xl font-black leading-tight uppercase mb-8 italic tracking-tighter">{selected.title}</h3>
                            
                            <div className="bg-white/5 rounded-3xl p-8 mb-8 flex-1 overflow-y-auto border border-white/5">
                                <p className="text-sm text-zinc-400 leading-relaxed font-medium">{selected.desc}</p>
                            </div>
                            
                            {/* Кнопка источника */}
                            {selected.url ? (
                                <a href={selected.url} target="_blank" rel="noopener noreferrer" 
                                   className="w-full bg-white text-black py-5 rounded-2xl text-center text-[10px] font-black uppercase tracking-[0.2em] hover:bg-zinc-200 transition shadow-[0_10px_20px_rgba(255,255,255,0.1)]">
                                    Открыть источник
                                </a>
                            ) : (
                                <div className="w-full py-5 text-center text-[9px] font-bold text-zinc-600 uppercase border border-white/5 rounded-2xl">
                                    Источник не указан
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
